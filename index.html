<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCALPING GOLD Results - Today</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .poster-container {
            width: 1080px;
            max-width: 100%;
            background: linear-gradient(180deg, #0d1b2a 0%, #1b263b 30%, #0d1b2a 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.3), 0 0 120px rgba(0, 255, 136, 0.2);
            position: relative;
        }
        
        .poster-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 255, 136, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .header-section {
            text-align: center;
            padding: 40px 30px 30px;
            position: relative;
            z-index: 1;
        }
        
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700 0%, #ffec8b 30%, #ffd700 50%, #ffec8b 70%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            letter-spacing: 8px;
            margin-bottom: 10px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes titleGlow {
            from {
                text-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            }
            to {
                text-shadow: 0 0 60px rgba(255, 215, 0, 0.8), 0 0 80px rgba(255, 215, 0, 0.4);
            }
        }
        
        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: #ffffff;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        .star-icon {
            display: inline-block;
            color: #ffd700;
            font-size: 1.5rem;
            animation: starPulse 2s ease-in-out infinite;
        }
        
        @keyframes starPulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
        }
        
        .results-section {
            padding: 20px 40px;
            position: relative;
            z-index: 1;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 30px;
        }
        
        .result-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 15px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .result-item:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 255, 136, 0.05) 100%);
            border-color: rgba(0, 255, 136, 0.3);
            transform: translateY(-2px);
        }
        
        .result-item.loss {
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.1) 0%, rgba(255, 100, 100, 0.05) 100%);
            border-color: rgba(255, 100, 100, 0.3);
        }
        
        .result-item.loss:hover {
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.2) 0%, rgba(255, 100, 100, 0.1) 100%);
        }
        
        .pip-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 1px;
        }
        
        .check-icon {
            color: #00ff88;
            font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .cross-icon {
            color: #ff4444;
            font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }
        
        .summary-section {
            padding: 30px 40px;
            position: relative;
            z-index: 1;
        }
        
        .summary-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: #aaa;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .summary-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }
        
        .summary-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .summary-card.loss {
            border-color: rgba(255, 100, 100, 0.4);
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.1) 0%, rgba(255, 100, 100, 0.05) 100%);
        }
        
        .summary-card.profit {
            border-color: rgba(0, 255, 136, 0.4);
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 255, 136, 0.05) 100%);
        }
        
        .summary-card.net {
            border-color: rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 215, 0, 0.05) 100%);
        }
        
        .summary-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .summary-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .summary-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        .summary-value.loss {
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }
        
        .summary-value.profit {
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .summary-value.net {
            background: linear-gradient(135deg, #ffd700 0%, #ffec8b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        .chart-background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 215, 0, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        .generated-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            display: block;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        .image-container {
            padding: 20px 40px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        
        @media (max-width: 1080px) {
            .poster-container {
                width: 100%;
            }
            
            .results-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .summary-cards {
                grid-template-columns: 1fr;
            }
            
            .main-title {
                font-size: 2rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="poster-container">
        <div class="particles" id="particles"></div>
        
        <div class="header-section">
            <h1 class="main-title">SCALPING GOLD</h1>
            <p class="subtitle">Results for Today <span class="star-icon">⭐</span></p>
        </div>
        
        <div class="image-container">
            <img src="https://image.qwenlm.ai/public_source/c9973f59-2ad3-46a9-a703-4b7b5be82db7/16cccf9ac-1dda-4adb-9bb0-49d87fcdaf2e.png" alt="Scalping Gold Results" class="generated-image">
        </div>
        
        <div class="results-section">
            <div class="results-grid" id="resultsGrid"></div>
        </div>
        
        <div class="summary-section">
            <p class="summary-title">All trades hit one target only…</p>
            <div class="summary-cards">
                <div class="summary-card loss">
                    <div class="summary-icon">❌</div>
                    <div class="summary-label">Total Loss</div>
                    <div class="summary-value loss">360 pip</div>
                </div>
                <div class="summary-card profit">
                    <div class="summary-icon">✅</div>
                    <div class="summary-label">Total Profit</div>
                    <div class="summary-value profit">11,650 pip</div>
                </div>
                <div class="summary-card net">
                    <div class="summary-icon">💰</div>
                    <div class="summary-label">Net Profit</div>
                    <div class="summary-value net">11,290 pip</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Results data
        const results = [
            // 70 pip - 10 times
            ...Array(10).fill({ pip: 70, status: 'win' }),
            // 80 pip - 10 times
            ...Array(10).fill({ pip: 80, status: 'win' }),
            // 70 pip - 5 times
            ...Array(5).fill({ pip: 70, status: 'win' }),
            // 60 pip - 15 times
            ...Array(15).fill({ pip: 60, status: 'win' }),
            // 80 pip - 10 times
            ...Array(10).fill({ pip: 80, status: 'win' }),
            // 90 pip - 4 times (loss)
            ...Array(4).fill({ pip: 90, status: 'loss' }),
            // 80 pip - 29 times
            ...Array(29).fill({ pip: 80, status: 'win' }),
            // 70 pip - 30 times
            ...Array(30).fill({ pip: 70, status: 'win' }),
            // 80 pip - 10 times
            ...Array(10).fill({ pip: 80, status: 'win' }),
            // 70 pip - 40 times
            ...Array(40).fill({ pip: 70, status: 'win' })
        ];

        // Render results grid
        const resultsGrid = document.getElementById('resultsGrid');
        
        results.forEach((result, index) => {
            const item = document.createElement('div');
            item.className = `result-item ${result.status === 'loss' ? 'loss' : ''}`;
            item.style.animationDelay = `${index * 0.02}s`;
            
            const icon = result.status === 'win' ? '✓' : '✗';
            const iconClass = result.status === 'win' ? 'check-icon' : 'cross-icon';
            
            item.innerHTML = `
                <span class="pip-value">${result.pip} pip</span>
                <span class="${iconClass}">${icon}</span>
            `;
            
            resultsGrid.appendChild(item);
        });

        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (15 + Math.random() * 10) + 's';
            particle.style.opacity = Math.random() * 0.5 + 0.2;
            particle.style.width = (2 + Math.random() * 4) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }

        // Add hover animation to result items
        document.querySelectorAll('.result-item').forEach(item => {
            item.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-3px) scale(1.02)';
            });
            
            item.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0) scale(1)';
            });
        });

        // Animate summary cards on load
        document.querySelectorAll('.summary-card').forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 500 + index * 200);
        });
    </script>
</body>
</html>
